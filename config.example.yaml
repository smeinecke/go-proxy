listen_address: "::"
listen_port: 8080
debug_mode: false
test_port: -1
network_type: "tcp6"
max_timeout: 30 # session cache TTL in minutes
idle_timeout: 30 # tunnel idle timeout in seconds
enable_stats: true # disable to remove atomic counter overhead on the hot path
log_level: "warn" # trace, debug, info, warn, error, fatal, panic. defaults to warn
auth:
  type: "credentials"
  credentials:
    username: "username"
    password: "password"
  redis:
    dsn: "redis://localhost:6379"
bind_prefixes:
  - "2a14:dead:beef::1/48"
  - "2a14:dead:feed::1/48"
enable_fallback: true
fallback_prefixes:
  - "1.2.3.4/32"
located_prefixes:
  us:
    - 2a14:dead:beef::/48
  uk:
    - 2a14:dead:feed::/48
replace_ips:
  "1.2.3.0/24": "2a14:dead:beef::"
deleted_headers:
  - "Proxy-Authorization"
  - "Proxy-Connection"
dns:
  type: "system" # system or custom
  servers:
    - "1.1.1.1"
  timeout: 5
blocked_cidrs: # additional blocked CIDRs beyond default private ranges
  - "10.0.0.0/8"
management:
  enabled: false
  listen_address: "127.0.0.1"
  port: 9090
  token: ""
