name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.26.x", "1.25.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Show Go version
        run: go version

      - name: Download modules
        run: go mod download

      - name: Check go.mod / go.sum are tidy
        if: matrix.go-version == '1.26.x'
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check formatting
        if: matrix.go-version == '1.26.x'
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$files"
            exit 1
          fi

      - name: Vet
        if: matrix.go-version == '1.26.x'
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Race test
        if: matrix.go-version == '1.26.x'
        run: go test -race -v ./...

      - name: Install govulncheck
        if: matrix.go-version == '1.26.x'
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        if: matrix.go-version == '1.26.x'
        run: govulncheck ./...

      - name: Check GoReleaser config
        if: matrix.go-version == '1.26.x'
        run: |
          go install github.com/goreleaser/goreleaser/v2@latest
          goreleaser check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Build binary
        run: go build -v ./...

  build-cross-platform:
    name: Build Cross-Platform
    runs-on: ubuntu-latest
    needs: lint-test
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=ci -X main.commit=${{ github.sha }}" -v -o go-proxy-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: go-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
